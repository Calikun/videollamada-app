<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoCall - Sala de espera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a10, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            background: rgba(30,30,40,0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(124,111,247,0.3);
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #a99ef7, #7c6ff7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub { color: #aaa; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 14px;
            background: #1c1c26;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            background: #7c6ff7;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: 0.2s;
        }
        button:hover { background: #6a5ce0; transform: scale(0.98); }
        .secondary { background: #2a2a35; }
        .secondary:hover { background: #3a3a48; }
        .or { margin: 15px 0; color: #666; }
        .info { font-size: 12px; color: #7c6ff7; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎥 VideoCall</h1>
    <div class="sub">Conecta con quien quieras, donde quieras</div>
    <input type="text" id="roomId" placeholder="ID de la sala (ej: abc123)">
    <button id="joinBtn">🔗 Unirse a sala</button>
    <div class="or">— o —</div>
    <button id="createBtn" class="secondary">✨ Crear nueva sala</button>
    <div class="info">Las salas son privadas y temporales. Comparte el ID con tus amigos.</div>
</div>
<script>
    const joinBtn = document.getElementById('joinBtn');
    const createBtn = document.getElementById('createBtn');
    const roomInput = document.getElementById('roomId');
    function joinRoom(roomId) {
        if (!roomId.trim()) return alert('Ingresa un ID');
        window.location.href = `/room/${encodeURIComponent(roomId)}`;
    }
    function createRoom() {
        const newId = Math.random().toString(36).substring(2, 8);
        window.location.href = `/room/${newId}`;
    }
    joinBtn.addEventListener('click', () => joinRoom(roomInput.value));
    createBtn.addEventListener('click', createRoom);
    roomInput.addEventListener('keypress', (e) => e.key === 'Enter' && joinRoom(roomInput.value));
</script>
</body>
</html>
