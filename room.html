<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VideoCall · Sala {{ROOM_ID}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a10;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Top bar */
        .topbar {
            background: #18181f;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .room-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            background: #1c1c26;
            padding: 6px 16px;
            border-radius: 40px;
            font-family: monospace;
        }
        .copy-btn {
            background: #2a2a35;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: #3a3a48;
        }
        .participants-count {
            background: #1c1c26;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
        }
        /* Main layout */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .videos-area {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            padding: 20px;
            overflow-y: auto;
            background: #0f0f13;
        }
        .video-card {
            background: #1c1c26;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }
        .video-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .host-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(124,111,247,0.8);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        .muted-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
        }
        .video-card .controls-overlay {
            position: absolute;
            bottom: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
        }
        .host-action-btn {
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
        }
        /* Chat panel */
        .chat-panel {
            width: 280px;
            background: #18181f;
            border-left: 0.5px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .chat-header {
            padding: 16px;
            border-bottom: 0.5px solid rgba(255,255,255,0.08);
            font-weight: 600;
            font-size: 14px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-message {
            font-size: 13px;
            word-wrap: break-word;
        }
        .chat-message .sender {
            font-weight: 600;
            color: #a99ef7;
            margin-right: 8px;
        }
        .chat-message.system {
            color: #8a8a98;
            font-style: italic;
            font-size: 12px;
            text-align: center;
        }
        .chat-input-area {
            padding: 16px;
            border-top: 0.5px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 8px;
        }
        .chat-input-area input {
            flex: 1;
            background: #1c1c26;
            border: 1px solid #2a2a35;
            border-radius: 24px;
            padding: 10px 14px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        .chat-input-area button {
            background: #7c6ff7;
            border: none;
            border-radius: 24px;
            padding: 0 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        /* Controls bar */
        .controls-bar {
            background: #18181f;
            padding: 12px 24px;
            display: flex;
            justify-content: center;
            gap: 16px;
            border-top: 0.5px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .ctrl-btn {
            background: #2a2a35;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn.primary {
            background: #7c6ff7;
        }
        .ctrl-btn.danger {
            background: #c23535;
        }
        .ctrl-btn:hover {
            transform: scale(0.96);
            filter: brightness(1.1);
        }
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2a35;
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            animation: fadeOut 2.5s forwards;
            z-index: 1000;
            pointer-events: none;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        @media (max-width: 800px) {
            .chat-panel { width: 240px; }
            .videos-area { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
        }
        @media (max-width: 600px) {
            .main-container { flex-direction: column; }
            .chat-panel { width: 100%; height: 240px; border-left: none; border-top: 0.5px solid rgba(255,255,255,0.08); }
            .videos-area { order: 1; }
            .chat-panel { order: 2; }
        }
    </style>
</head>
<body>
<div class="topbar">
    <div class="room-info">
        <span>Sala</span>
        <strong id="roomIdDisplay">{{ROOM_ID}}</strong>
        <button class="copy-btn" id="copyBtn">Copiar ID</button>
    </div>
    <div class="participants-count" id="participantsCount">Participantes: 1</div>
</div>
<div class="main-container">
    <div class="videos-area" id="videosGrid"></div>
    <div class="chat-panel">
        <div class="chat-header">Chat de la reunión</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Escribe un mensaje...">
            <button id="sendChatBtn">Enviar</button>
        </div>
    </div>
</div>
<div class="controls-bar">
    <button class="ctrl-btn" id="micBtn">🎤</button>
    <button class="ctrl-btn" id="camBtn">📷</button>
    <button class="ctrl-btn primary" id="startCallBtn">📞</button>
    <button class="ctrl-btn danger" id="hangupBtn">❌</button>
</div>

<script>
    // Obtener datos de identidad de la URL
    const roomId = '{{ROOM_ID}}';
    const urlParams = new URLSearchParams(window.location.search);
    let myName = urlParams.get('name') || 'Anónimo';
    let myRole = urlParams.get('role') || '';
    const myDisplay = myRole ? `${myName} (${myRole})` : myName;

    const WS_URL = `wss://${window.location.host}/ws/${roomId}`;
    let socket = null;
    let localStream = null;
    let peers = {};          // userId -> RTCPeerConnection
    let peersInfo = {};      // userId -> { display, isHost, muted }
    let callStarted = false;
    let micEnabled = true;
    let camEnabled = true;
    let myUserId = null;
    let amIHost = false;
    let hostId = null;

    const videosGrid = document.getElementById('videosGrid');
    const participantsSpan = document.getElementById('participantsCount');
    const chatMessagesDiv = document.getElementById('chatMessages');

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function updateParticipantsCount() {
        const count = Object.keys(peers).length + (localStream ? 1 : 0);
        participantsSpan.innerText = `Participantes: ${count}`;
    }

    function addChatMessage(sender, message, isSystem = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message';
        if (isSystem) {
            msgDiv.classList.add('system');
            msgDiv.innerText = message;
        } else {
            msgDiv.innerHTML = `<span class="sender">${escapeHtml(sender)}</span><span>${escapeHtml(message)}</span>`;
        }
        chatMessagesDiv.appendChild(msgDiv);
        msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function createVideoElement(userId, displayName, isLocal = false, isHost = false, isMuted = false) {
        const container = document.createElement('div');
        container.className = 'video-card';
        container.id = `video-${userId}`;
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        if (isLocal) video.muted = true;
        const label = document.createElement('div');
        label.className = 'video-label';
        label.innerText = isLocal ? `Tú (${displayName})` : displayName;
        container.appendChild(video);
        container.appendChild(label);
        if (isHost && !isLocal) {
            const hostBadge = document.createElement('div');
            hostBadge.className = 'host-badge';
            hostBadge.innerText = 'Anfitrión';
            container.appendChild(hostBadge);
        }
        if (isMuted && !isLocal) {
            const mutedBadge = document.createElement('div');
            mutedBadge.className = 'muted-badge';
            mutedBadge.innerText = '🔇 Silenciado';
            container.appendChild(mutedBadge);
        }
        // Si soy el anfitrión y el usuario no soy yo, mostrar botones de silenciar/expulsar
        if (amIHost && !isLocal) {
            const controlsDiv = document.createElement('div');
            controlsDiv.className = 'controls-overlay';
            const muteBtn = document.createElement('button');
            muteBtn.className = 'host-action-btn';
            muteBtn.innerText = isMuted ? '🔊 Activar' : '🔇 Silenciar';
            muteBtn.onclick = (e) => {
                e.stopPropagation();
                socket.send(JSON.stringify({
                    type: 'host-mute',
                    targetId: userId,
                    mute: !isMuted
                }));
            };
            const kickBtn = document.createElement('button');
            kickBtn.className = 'host-action-btn';
            kickBtn.innerText = '🚫 Expulsar';
            kickBtn.onclick = (e) => {
                e.stopPropagation();
                if (confirm(`¿Expulsar a ${displayName}?`)) {
                    socket.send(JSON.stringify({
                        type: 'host-kick',
                        targetId: userId
                    }));
                }
            };
            controlsDiv.appendChild(muteBtn);
            controlsDiv.appendChild(kickBtn);
            container.appendChild(controlsDiv);
        }
        videosGrid.appendChild(container);
        return { container, video };
    }

    function removeVideoElement(userId) {
        const el = document.getElementById(`video-${userId}`);
        if (el) el.remove();
    }

    async function createPeerConnection(remoteUserId, isInitiator = true) {
        if (peers[remoteUserId]) return peers[remoteUserId];
        const pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });
        peers[remoteUserId] = pc;

        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        pc.ontrack = (event) => {
            let container = document.getElementById(`video-${remoteUserId}`);
            let video;
            if (!container) {
                const info = peersInfo[remoteUserId] || { display: `Usuario ${remoteUserId.substring(0,6)}`, isHost: false, muted: false };
                const newEl = createVideoElement(remoteUserId, info.display, false, info.isHost, info.muted);
                container = newEl.container;
                video = newEl.video;
            } else {
                video = container.querySelector('video');
            }
            if (video.srcObject !== event.streams[0]) {
                video.srcObject = event.streams[0];
            }
        };

        pc.onicecandidate = (event) => {
            if (event.candidate && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'candidate',
                    candidate: event.candidate,
                    target: remoteUserId
                }));
            }
        };

        pc.oniceconnectionstatechange = () => {
            if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                if (peers[remoteUserId]) {
                    peers[remoteUserId].close();
                    delete peers[remoteUserId];
                    removeVideoElement(remoteUserId);
                    updateParticipantsCount();
                }
            }
        };

        if (isInitiator && localStream && callStarted) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.send(JSON.stringify({
                type: 'offer',
                offer: offer,
                target: remoteUserId
            }));
        }
        updateParticipantsCount();
        return pc;
    }

    async function handleSignalingMessage(msg) {
        switch (msg.type) {
            case 'existing-users':
                myUserId = msg.senderId; // puede venir implícito, pero mejor guardarlo luego
                amIHost = msg.isHost;
                hostId = msg.hostId;
                for (const user of msg.users) {
                    peersInfo[user.userId] = { display: user.display, isHost: user.isHost, muted: user.muted };
                    if (localStream && callStarted && !peers[user.userId]) {
                        await createPeerConnection(user.userId, true);
                    }
                }
                updateParticipantsCount();
                break;
            case 'user-joined':
                peersInfo[msg.userId] = { display: msg.display, isHost: msg.isHost, muted: msg.muted };
                if (localStream && callStarted && !peers[msg.userId]) {
                    await createPeerConnection(msg.userId, true);
                }
                addChatMessage('Sistema', `${msg.display} se ha unido a la sala`, true);
                updateParticipantsCount();
                break;
            case 'user-left':
                if (peers[msg.userId]) {
                    peers[msg.userId].close();
                    delete peers[msg.userId];
                    removeVideoElement(msg.userId);
                }
                if (peersInfo[msg.userId]) {
                    addChatMessage('Sistema', `${peersInfo[msg.userId].display} ha salido de la sala`, true);
                    delete peersInfo[msg.userId];
                }
                updateParticipantsCount();
                break;
            case 'host-info':
                hostId = msg.hostId;
                amIHost = (myUserId === hostId);
                // Actualizar badges de host en las tarjetas
                for (const [uid, info] of Object.entries(peersInfo)) {
                    info.isHost = (uid === hostId);
                    // Refrescar UI (simple: recargar las tarjetas? Mejor no, solo actualizar visualmente)
                    const card = document.getElementById(`video-${uid}`);
                    if (card) {
                        let badge = card.querySelector('.host-badge');
                        if (info.isHost && !badge) {
                            const newBadge = document.createElement('div');
                            newBadge.className = 'host-badge';
                            newBadge.innerText = 'Anfitrión';
                            card.appendChild(newBadge);
                        } else if (!info.isHost && badge) badge.remove();
                    }
                }
                if (amIHost) showToast('Ahora eres el anfitrión. Puedes silenciar o expulsar participantes.');
                break;
            case 'user-muted':
                if (peersInfo[msg.userId]) {
                    peersInfo[msg.userId].muted = msg.muted;
                    // Actualizar badge visual en la tarjeta
                    const card = document.getElementById(`video-${msg.userId}`);
                    if (card) {
                        let mutedBadge = card.querySelector('.muted-badge');
                        if (msg.muted && !mutedBadge) {
                            const badge = document.createElement('div');
                            badge.className = 'muted-badge';
                            badge.innerText = '🔇 Silenciado';
                            card.appendChild(badge);
                        } else if (!msg.muted && mutedBadge) mutedBadge.remove();
                        // También actualizar texto del botón si soy host
                        const muteBtn = card.querySelector('.host-action-btn:first-child');
                        if (muteBtn) muteBtn.innerText = msg.muted ? '🔊 Activar' : '🔇 Silenciar';
                    }
                }
                break;
            case 'kicked':
                showToast(msg.reason);
                setTimeout(() => window.location.href = '/', 2000);
                break;
            case 'offer':
                if (!peers[msg.senderId]) {
                    peersInfo[msg.senderId] = { display: msg.senderName || `Usuario ${msg.senderId.substring(0,6)}`, isHost: false, muted: false };
                    await createPeerConnection(msg.senderId, false);
                }
                const pcOffer = peers[msg.senderId];
                if (pcOffer && !pcOffer.remoteDescription) {
                    await pcOffer.setRemoteDescription(new RTCSessionDescription(msg.offer));
                    const answer = await pcOffer.createAnswer();
                    await pcOffer.setLocalDescription(answer);
                    socket.send(JSON.stringify({
                        type: 'answer',
                        answer: answer,
                        target: msg.senderId
                    }));
                }
                break;
            case 'answer':
                if (peers[msg.senderId]) {
                    await peers[msg.senderId].setRemoteDescription(new RTCSessionDescription(msg.answer));
                }
                break;
            case 'candidate':
                if (peers[msg.senderId]) {
                    try {
                        await peers[msg.senderId].addIceCandidate(new RTCIceCandidate(msg.candidate));
                    } catch(e) { console.warn('ICE error', e); }
                }
                break;
            case 'chat':
                addChatMessage(msg.senderName || msg.senderDisplay, msg.message, false);
                break;
        }
        if (msg.senderId && !myUserId && msg.type !== 'existing-users') {
            // Podríamos asignar myUserId más tarde, pero normalmente llegará en existing-users
        }
    }

    function connectWebSocket() {
        socket = new WebSocket(WS_URL);
        socket.onopen = () => {
            socket.send(JSON.stringify({ name: myName, role: myRole }));
            showToast('Conectado al servidor');
        };
        socket.onmessage = async (e) => {
            const msg = JSON.parse(e.data);
            await handleSignalingMessage(msg);
        };
        socket.onerror = () => showToast('Error de conexión');
        socket.onclose = () => showToast('Desconectado del servidor');
    }

    async function startCall() {
        if (callStarted) {
            showToast('La llamada ya está activa');
            return;
        }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            // Crear mi propio video
            const { video } = createVideoElement('local', myDisplay, true, amIHost, false);
            video.srcObject = localStream;
            callStarted = true;

            // Conectar con todos los peers existentes
            for (const userId in peersInfo) {
                if (!peers[userId]) {
                    await createPeerConnection(userId, true);
                }
            }
            updateParticipantsCount();
            showToast('Cámara y micrófono activados');
        } catch (err) {
            console.error(err);
            showToast('No se pudo acceder a la cámara o micrófono');
        }
    }

    function hangUp() {
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        for (const userId in peers) {
            peers[userId].close();
            delete peers[userId];
        }
        videosGrid.innerHTML = '';
        callStarted = false;
        updateParticipantsCount();
        showToast('Llamada finalizada');
        // No recargamos, solo paramos. El usuario puede volver a iniciar.
    }

    function toggleMic() {
        if (localStream) {
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                micEnabled = !micEnabled;
                audioTrack.enabled = micEnabled;
                document.getElementById('micBtn').style.opacity = micEnabled ? '1' : '0.5';
                showToast(micEnabled ? 'Micrófono activado' : 'Micrófono silenciado');
            }
        }
    }

    function toggleCam() {
        if (localStream) {
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                camEnabled = !camEnabled;
                videoTrack.enabled = camEnabled;
                document.getElementById('camBtn').style.opacity = camEnabled ? '1' : '0.5';
                showToast(camEnabled ? 'Cámara activada' : 'Cámara apagada');
            }
        }
    }

    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (text === "") return;
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
                type: 'chat',
                message: text
            }));
            input.value = '';
        } else {
            showToast('No conectado al servidor');
        }
    }

    // Event listeners
    document.getElementById('startCallBtn').addEventListener('click', startCall);
    document.getElementById('hangupBtn').addEventListener('click', hangUp);
    document.getElementById('micBtn').addEventListener('click', toggleMic);
    document.getElementById('camBtn').addEventListener('click', toggleCam);
    document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(roomId);
        showToast('ID de sala copiado');
    });
    document.getElementById('sendChatBtn').addEventListener('click', sendChatMessage);
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChatMessage();
    });
    document.getElementById('roomIdDisplay').innerText = roomId;

    connectWebSocket();
</script>
</body>
</html>
