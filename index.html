<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoCall · Sala de reuniones profesional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #0a0a10 0%, #12121a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }
        .lobby {
            background: rgba(18, 18, 26, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            border: 1px solid rgba(124, 111, 247, 0.25);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #a99ef7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #8a8a98;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            background: #1c1c26;
            border: 1px solid #2a2a35;
            border-radius: 28px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #7c6ff7;
            box-shadow: 0 0 0 2px rgba(124, 111, 247, 0.2);
        }
        button {
            background: #7c6ff7;
            border: none;
            padding: 14px 18px;
            border-radius: 28px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        button:hover {
            background: #6a5ce0;
            transform: translateY(-1px);
        }
        button.secondary {
            background: #2a2a35;
        }
        button.secondary:hover {
            background: #3a3a48;
        }
        .divider {
            margin: 20px 0;
            font-size: 0.8rem;
            color: #5a5a68;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 0.5px;
            background: #2a2a35;
        }
        .info-text {
            font-size: 0.75rem;
            color: #7c6ff7;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="lobby">
    <h1>VideoCall</h1>
    <div class="subtitle">Reuniones profesionales en la nube</div>
    <div class="input-group">
        <label>Nombre completo</label>
        <input type="text" id="nameInput" placeholder="Ej: Ana García" maxlength="40">
    </div>
    <div class="input-group">
        <label>Cargo / Rol</label>
        <input type="text" id="roleInput" placeholder="Ej: Directora de Proyectos" maxlength="40">
    </div>
    <div class="input-group">
        <label>ID de sala (opcional)</label>
        <input type="text" id="roomIdInput" placeholder="Dejar vacío para crear nueva">
    </div>
    <button id="joinBtn">Unirse o crear sala</button>
    <div class="info-text">El primer participante será el anfitrión con control sobre la reunión.</div>
</div>
<script>
    const joinBtn = document.getElementById('joinBtn');
    const roomInput = document.getElementById('roomIdInput');
    const nameInput = document.getElementById('nameInput');
    const roleInput = document.getElementById('roleInput');

    function getIdentity() {
        let name = nameInput.value.trim();
        let role = roleInput.value.trim();
        if (name === "") name = "Anónimo";
        return { name, role };
    }

    function joinOrCreate() {
        let roomId = roomInput.value.trim();
        if (roomId === "") {
            // Crear nueva sala con ID aleatorio
            roomId = Math.random().toString(36).substring(2, 10);
        }
        const { name, role } = getIdentity();
        const params = new URLSearchParams();
        params.set('name', name);
        params.set('role', role);
        window.location.href = `/room/${encodeURIComponent(roomId)}?${params.toString()}`;
    }

    joinBtn.addEventListener('click', joinOrCreate);
    roomInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') joinOrCreate();
    });
    nameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') joinOrCreate();
    });
    roleInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') joinOrCreate();
    });
</script>
</body>
</html>
