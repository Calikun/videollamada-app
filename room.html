<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VideoCall · Sala {{ROOM_ID}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a10;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topbar {
            background: #18181f;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .room-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            background: #1c1c26;
            padding: 6px 16px;
            border-radius: 40px;
            font-family: monospace;
        }
        .copy-btn {
            background: #2a2a35;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: #3a3a48;
        }
        .participants-count {
            background: #1c1c26;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
        }
        .videos-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
            padding: 20px;
            overflow-y: auto;
            background: #0f0f13;
        }
        .video-card {
            background: #1c1c26;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }
        .video-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .controls-bar {
            background: #18181f;
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            gap: 16px;
            border-top: 0.5px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .ctrl-btn {
            background: #2a2a35;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn.primary {
            background: #7c6ff7;
        }
        .ctrl-btn.danger {
            background: #c23535;
        }
        .ctrl-btn:hover {
            transform: scale(0.96);
            filter: brightness(1.1);
        }
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2a35;
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            animation: fadeOut 2.5s forwards;
            z-index: 1000;
            pointer-events: none;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        @media (max-width: 700px) {
            .videos-grid {
                grid-template-columns: 1fr;
                padding: 12px;
                gap: 12px;
            }
            .ctrl-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
<div class="topbar">
    <div class="room-info">
        <span>Sala</span>
        <strong id="roomIdDisplay">{{ROOM_ID}}</strong>
        <button class="copy-btn" id="copyBtn">Copiar ID</button>
    </div>
    <div class="participants-count" id="participantsCount">Participantes: 1</div>
</div>
<div class="videos-grid" id="videosGrid"></div>
<div class="controls-bar">
    <button class="ctrl-btn" id="micBtn">🎤</button>
    <button class="ctrl-btn" id="camBtn">📷</button>
    <button class="ctrl-btn primary" id="startCallBtn">📞</button>
    <button class="ctrl-btn danger" id="hangupBtn">❌</button>
</div>

<script>
    const roomId = '{{ROOM_ID}}';
    const WS_URL = `wss://${window.location.host}/ws/${roomId}`;
    let socket = null;
    let localStream = null;
    let peers = {};       // userId -> RTCPeerConnection
    let callStarted = false;
    let micEnabled = true;
    let camEnabled = true;

    const videosGrid = document.getElementById('videosGrid');
    const participantsSpan = document.getElementById('participantsCount');

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function updateParticipantsCount() {
        const count = Object.keys(peers).length + (localStream ? 1 : 0);
        participantsSpan.innerText = `Participantes: ${count}`;
    }

    function createVideoElement(userId, isLocal = false) {
        const container = document.createElement('div');
        container.className = 'video-card';
        container.id = `video-${userId}`;
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        if (isLocal) video.muted = true;
        const label = document.createElement('div');
        label.className = 'video-label';
        label.innerText = isLocal ? 'Tú' : `Usuario ${userId.substring(0, 6)}`;
        container.appendChild(video);
        container.appendChild(label);
        videosGrid.appendChild(container);
        return { container, video };
    }

    function removeVideoElement(userId) {
        const el = document.getElementById(`video-${userId}`);
        if (el) el.remove();
    }

    async function createPeerConnection(remoteUserId, isInitiator = true) {
        if (peers[remoteUserId]) return peers[remoteUserId];
        const pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });
        peers[remoteUserId] = pc;

        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        pc.ontrack = (event) => {
            let container = document.getElementById(`video-${remoteUserId}`);
            let video;
            if (!container) {
                const newEl = createVideoElement(remoteUserId, false);
                container = newEl.container;
                video = newEl.video;
            } else {
                video = container.querySelector('video');
            }
            if (video.srcObject !== event.streams[0]) {
                video.srcObject = event.streams[0];
            }
        };

        pc.onicecandidate = (event) => {
            if (event.candidate && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'candidate',
                    candidate: event.candidate,
                    target: remoteUserId
                }));
            }
        };

        pc.oniceconnectionstatechange = () => {
            if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                if (peers[remoteUserId]) {
                    peers[remoteUserId].close();
                    delete peers[remoteUserId];
                    removeVideoElement(remoteUserId);
                    updateParticipantsCount();
                    showToast(`Usuario ${remoteUserId.substring(0,6)} desconectado`);
                }
            }
        };

        if (isInitiator && localStream && callStarted) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.send(JSON.stringify({
                type: 'offer',
                offer: offer,
                target: remoteUserId
            }));
        }
        updateParticipantsCount();
        return pc;
    }

    async function handleSignalingMessage(msg) {
        switch (msg.type) {
            case 'existing-users':
                for (const userId of msg.users) {
                    if (!peers[userId] && localStream && callStarted) {
                        await createPeerConnection(userId, true);
                    }
                }
                break;
            case 'user-joined':
                if (localStream && callStarted && !peers[msg.userId]) {
                    await createPeerConnection(msg.userId, true);
                }
                break;
            case 'user-left':
                if (peers[msg.userId]) {
                    peers[msg.userId].close();
                    delete peers[msg.userId];
                    removeVideoElement(msg.userId);
                    updateParticipantsCount();
                }
                break;
            case 'offer':
                if (!peers[msg.sender]) {
                    await createPeerConnection(msg.sender, false);
                }
                const pcOffer = peers[msg.sender];
                if (pcOffer && !pcOffer.remoteDescription) {
                    await pcOffer.setRemoteDescription(new RTCSessionDescription(msg.offer));
                    const answer = await pcOffer.createAnswer();
                    await pcOffer.setLocalDescription(answer);
                    socket.send(JSON.stringify({
                        type: 'answer',
                        answer: answer,
                        target: msg.sender
                    }));
                }
                break;
            case 'answer':
                if (peers[msg.sender]) {
                    await peers[msg.sender].setRemoteDescription(new RTCSessionDescription(msg.answer));
                }
                break;
            case 'candidate':
                if (peers[msg.sender]) {
                    try {
                        await peers[msg.sender].addIceCandidate(new RTCIceCandidate(msg.candidate));
                    } catch(e) { console.warn('ICE falló', e); }
                }
                break;
        }
    }

    function connectWebSocket() {
        socket = new WebSocket(WS_URL);
        socket.onopen = () => showToast('Conectado al servidor');
        socket.onmessage = async (e) => {
            const msg = JSON.parse(e.data);
            await handleSignalingMessage(msg);
        };
        socket.onerror = () => showToast('Error de conexión');
        socket.onclose = () => showToast('Desconectado del servidor');
    }

    async function startCall() {
        if (callStarted) {
            showToast('La llamada ya está activa');
            return;
        }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const { video } = createVideoElement('local', true);
            video.srcObject = localStream;
            callStarted = true;

            // Crear conexiones con usuarios que ya estén en la sala
            // (los mensajes 'existing-users' pueden haber llegado antes o después)
            // Si ya hay peers definidos (por mensajes previos), los usamos.
            for (const userId in peers) {
                if (!peers[userId].localDescription && localStream) {
                    await createPeerConnection(userId, true);
                }
            }
            updateParticipantsCount();
            showToast('Cámara y micrófono activados');
        } catch (err) {
            console.error(err);
            showToast('No se pudo acceder a la cámara o micrófono');
        }
    }

    function hangUp() {
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        for (const userId in peers) {
            peers[userId].close();
            delete peers[userId];
        }
        // Eliminar todos los videos
        videosGrid.innerHTML = '';
        callStarted = false;
        updateParticipantsCount();
        showToast('Llamada finalizada');
    }

    function toggleMic() {
        if (localStream) {
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                micEnabled = !micEnabled;
                audioTrack.enabled = micEnabled;
                document.getElementById('micBtn').style.opacity = micEnabled ? '1' : '0.5';
                showToast(micEnabled ? 'Micrófono activado' : 'Micrófono silenciado');
            }
        }
    }

    function toggleCam() {
        if (localStream) {
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                camEnabled = !camEnabled;
                videoTrack.enabled = camEnabled;
                document.getElementById('camBtn').style.opacity = camEnabled ? '1' : '0.5';
                showToast(camEnabled ? 'Cámara activada' : 'Cámara apagada');
            }
        }
    }

    // Event listeners
    document.getElementById('startCallBtn').addEventListener('click', startCall);
    document.getElementById('hangupBtn').addEventListener('click', hangUp);
    document.getElementById('micBtn').addEventListener('click', toggleMic);
    document.getElementById('camBtn').addEventListener('click', toggleCam);
    document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(roomId);
        showToast('ID de sala copiado');
    });
    document.getElementById('roomIdDisplay').innerText = roomId;

    connectWebSocket();
</script>
</body>
</html>
